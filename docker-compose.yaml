version: '3.8'

services:
  # n8n: El orquestador que conectará todo
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_hito3
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_USER_FOLDER=/home/node/.n8n
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./documentos:/home/node/.n8n-files
    networks:
      - hito3_net

  # PostgreSQL: Para guardar metadatos de documentos y el historial del chat
  postgres:
    image: postgres:16
    container_name: postgres_hito3
    restart: unless-stopped
    environment:
      POSTGRES_DB: hito3_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "hito3_password"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hito3_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hito3_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant: Base de datos vectorial para el Proyecto A (RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_hito3
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hito3_net

  # pgAdmin: Interfaz web para gestionar la base de datos SQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_hito3
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: "admin"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - hito3_net

  # Ollama: Servicio para ejecutar modelos de lenguaje localmente
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_hito3
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hito3_net

networks:
  hito3_net:
    driver: bridge

volumes:
  n8n_data:
  postgres_data:
  qdrant_data:
  ollama_data: